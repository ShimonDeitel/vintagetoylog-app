name: VintageToyLog
options:
  bundleIdPrefix: com.shimondeitel.vintagetoylog
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top
settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: "W7Q885Q59C"
    CODE_SIGN_STYLE: Automatic
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1"
    ENABLE_USER_SCRIPT_SANDBOXING: "YES"
targets:
  VintageToyLog:
    type: application
    platform: iOS
    sources:
      - path: VintageToyLog
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.vintagetoylog
        TARGETED_DEVICE_FAMILY: "1"
        INFOPLIST_FILE: VintageToyLog/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_PREVIEWS: "YES"
        GENERATE_INFOPLIST_FILE: "NO"
  VintageToyLogTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: VintageToyLogTests
      - path: VintageToyLog.storekit
    dependencies:
      - target: VintageToyLog
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.vintagetoylog.tests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
  VintageToyLogUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: VintageToyLogUITests
    dependencies:
      - target: VintageToyLog
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.vintagetoylog.uitests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
schemes:
  VintageToyLog:
    build:
      targets:
        VintageToyLog: all
        VintageToyLogTests: [test]
        VintageToyLogUITests: [test]
    test:
      targets:
        - VintageToyLogTests
        - VintageToyLogUITests
