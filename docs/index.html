<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Vintage Toy Log</title>
<style>
  body { margin:0; background:#161011; color:#F8E9E7; font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif; display:flex; align-items:center; justify-content:center; min-height:100vh; text-align:center; padding:24px; }
  .card { max-width:560px; }
  h1 { font-size:2.4rem; margin-bottom:8px; color:#E0483E; }
  p { color:#BB8C88; line-height:1.6; }
  .links a { color:#E0483E; text-decoration:none; margin:0 10px; }

  @keyframes floatOrb {
    0%, 100% { transform: translate(0,0) scale(1); }
    50% { transform: translate(30px,-40px) scale(1.08); }
  }
  @keyframes fadeUp {
    from { opacity:0; transform: translateY(16px); }
    to { opacity:1; transform: translateY(0); }
  }
  .orb {
    position: fixed; top: -120px; right: -120px; width: 420px; height: 420px;
    background: radial-gradient(circle, #E0483E55 0%, #E0483E00 70%);
    filter: blur(10px); pointer-events: none; z-index: 0;
    animation: floatOrb 9s ease-in-out infinite;
  }
  .wrap { position: relative; z-index: 1; }
  h1 { animation: fadeUp 0.8s ease-out both; }
  p.tagline { animation: fadeUp 0.8s ease-out 0.15s both; }
  .feature { animation: fadeUp 0.8s ease-out both; transition: transform 0.25s ease; }
  .feature:nth-of-type(1) { animation-delay: 0.3s; }
  .feature:nth-of-type(2) { animation-delay: 0.45s; }
  .feature:hover { transform: translateY(-3px); }
  footer { animation: fadeUp 0.8s ease-out 0.6s both; }
</style>
</head>
<body>
<div class="orb"></div>
  <div class="card">
    <h1>Vintage Toy Log</h1>
    <p>Catalog vintage toy collections with condition grade and box status.</p>
    <p class="links"><a href="privacy.html">Privacy</a> &middot; <a href="terms.html">Terms</a></p>
    <p>Contact: s0533495227@gmail.com</p>
  </div>
</body>
</html>
